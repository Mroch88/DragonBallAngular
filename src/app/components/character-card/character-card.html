<!-- Tarjeta donde se muestra la información del personaje -->
<div class="card">

  <!-- Nombre del personaje -->
  <h2>{{ character.name }}</h2>

  <!-- Imagen del personaje -->
  <img [src]="character.image">

  <!-- Raza y género del personaje -->
  <p>{{ character.race }} - {{ character.gender }}</p>

  <!-- Nivel de KI base del personaje -->
  <p>Base KI: {{ character.ki }}</p>

</div>
